<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<link rel="icon" type="image/png" href="icon.png">
<link rel="shortcut icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<title>dodotv</title>
<style>html,body{height:100%;margin:0;background:#111;color:#aaa;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}img{width:72px;height:72px;border-radius:16px}a{color:#4ea1ff;text-decoration:none;font-size:14px}</style>
</head>
<body>
<img src="icon.png" alt="">
<div id="m">잠시 후 이동합니다…</div>
<a id="go" href="#">바로 이동</a>
<script>
fetch('../urls.json?_=' + Date.now(), { cache: 'no-store' })
  .then(function(r){ return r.json(); })
  .then(function(d){
    var u = d.dodotv && d.dodotv.url;
    if (!u) { document.getElementById('m').textContent = '주소 미설정'; return; }
    document.getElementById('go').setAttribute('href', u);
    var t = setTimeout(function(){ location.replace(u); }, 1500);
    document.addEventListener('visibilitychange', function(){ if (document.hidden) clearTimeout(t); });
  })
  .catch(function(){ document.getElementById('m').textContent = '불러오기 실패'; });
</script>
</body>
</html>
