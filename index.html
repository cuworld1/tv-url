<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231e88e5'/><text x='32' y='45' font-size='32' text-anchor='middle'>📺</text></svg>">
<title>최신 주소로 이동</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font-family:system-ui,sans-serif; background:#111; color:#eee;
         display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .wrap { text-align:center; padding:24px; }
  h1 { font-size:18px; font-weight:600; margin:0 0 16px; color:#aaa; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  a.site { display:block; padding:16px 20px; background:#1e1e1e; border:1px solid #333;
           border-radius:12px; color:#fff; text-decoration:none; font-size:16px; }
  a.site:active { background:#2a2a2a; }
  a.site small { display:block; color:#888; font-size:11px; margin-top:4px; word-break:break-all; }
  .msg { color:#888; font-size:14px; }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="msg">불러오는 중…</div></div>
<script>
(async function () {
  const app = document.getElementById('app');
  const key = (location.hash.slice(1) ||
               new URLSearchParams(location.search).get('go') || '').trim().toLowerCase();
  let data;
  try {
    const res = await fetch('urls.json?_=' + Date.now(), { cache: 'no-store' });
    data = await res.json();
  } catch (e) {
    app.innerHTML = '<div class="msg">주소 정보를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</div>';
    return;
  }
  // 특정 사이트로 즉시 이동
  if (key && data[key] && data[key].url) { location.replace(data[key].url); return; }
  // 키 없으면 버튼 목록(랜딩)
  const items = Object.keys(data).map(k => {
    const u = data[k].url;
    return u
      ? '<a class="site" href="' + u + '">' + k + '<small>' + u.replace(/^https?:\/\//,'') + '</small></a>'
      : '<a class="site" style="opacity:.5" href="#">' + k + '<small>주소 미설정</small></a>';
  }).join('');
  app.innerHTML = '<h1>최신 주소로 이동</h1><div class="grid">' + items + '</div>';
})();
</script>
</body>
</html>
