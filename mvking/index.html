<title>mvking</title>
<style>html,body{height:100%;margin:0;background:#111;color:#777;font:14px system-ui,sans-serif;display:flex;align-items:center;justify-content:center}</style>
</head>
<body>
<div id="m"></div>
<script>
(function(){
  var KEY='mvking', ck='tvurl_'+KEY;
  function done(u){ try{localStorage.setItem(ck,u);}catch(e){} location.replace(u); }
  function probe(u){ return new Promise(function(res){ var c=new AbortController(); var t=setTimeout(function(){c.abort();res(false);},4500); fetch(u,{mode:'no-cors',cache:'no-store',signal:c.signal}).then(function(){clearTimeout(t);res(true);}).catch(function(){clearTimeout(t);res(false);}); }); }
  function pickInOrder(list,batch){ var i=0; function nb(){ if(i>=list.length) return Promise.resolve(null); var s=list.slice(i,i+batch); i+=batch; return Promise.all(s.map(function(u){return probe(u).then(function(ok){return ok?u:null;});})).then(function(rs){ for(var j=0;j<rs.length;j++){ if(rs[j]) return rs[j]; } return nb(); }); } return nb(); }
  function build(cfg){ var L=[]; var c=null; try{c=localStorage.getItem(ck);}catch(e){} if(c) L.push(c); (cfg.candidates||[]).forEach(function(u){ if(L.indexOf(u)<0) L.push(u); }); if(cfg.gen){ var g=cfg.gen; for(var n=g.to;n>=g.from;n--){ (g.tlds||['com']).forEach(function(t){ var u2='https://'+g.base+n+'.'+t; if(L.indexOf(u2)<0) L.push(u2); }); } } return L; }
  fetch('../urls.json?_='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    var cfg=d[KEY]||{}; var L=build(cfg);
    if(!L.length){ document.getElementById('m').textContent='주소 없음'; return; }
    pickInOrder(L,12).then(function(u){ done(u||L[0]); });
  }).catch(function(){ document.getElementById('m').textContent='실패'; });
})();
</script>
