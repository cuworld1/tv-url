<title>tvroom</title>
<style>html,body{height:100%;margin:0;background:#111;color:#aaa;font:15px system-ui,sans-serif;display:flex;align-items:center;justify-content:center;text-align:center} a{color:#4ea1ff;display:block;margin:8px 0;text-decoration:none}</style>
</head>
<body>
<div id="m"></div>
<script>
(function(){
  var KEY='tvroom', ck='tvurl_'+KEY;
  function done(u){ try{localStorage.setItem(ck,u);}catch(e){} location.replace(u); }
  function msg(s){ document.getElementById('m').innerHTML=s; }
  function probe(u){ return new Promise(function(res){ var fin=false, fails=0; function hit(ok){ if(fin) return; if(ok){ fin=true; res(true); } else { if(++fails>=2){ fin=true; res(false); } } } var img=new Image(); var t1=setTimeout(function(){img.onload=img.onerror=null;hit(false);},6000); img.onload=function(){clearTimeout(t1);hit(true);}; img.onerror=function(){clearTimeout(t1);hit(false);}; img.src=u+'/favicon.ico?x='+Date.now(); var ac=new AbortController(); var t2=setTimeout(function(){try{ac.abort();}catch(e){}},6000); fetch(u,{mode:'no-cors',cache:'no-store',signal:ac.signal}).then(function(){clearTimeout(t2);hit(true);}).catch(function(){clearTimeout(t2);hit(false);}); }); }
  function pickInOrder(list,batch){ var i=0; function nb(){ if(i>=list.length) return Promise.resolve(null); var s=list.slice(i,i+batch); i+=batch; return Promise.all(s.map(function(u){return probe(u).then(function(ok){return ok?u:null;});})).then(function(rs){ for(var j=0;j<rs.length;j++){ if(rs[j]) return rs[j]; } return nb(); }); } return nb(); }
  function build(d,cfg){
    var L=[]; var c=null; try{c=localStorage.getItem(ck);}catch(e){} if(c) L.push(c);
    var base=cfg.base, lo=cfg.from||1, to=cfg.to||40, tlds=d._tlds||['com'];
    var lastN=0; if(c){ var cm=c.match(/(\d+)\./); if(cm) lastN=parseInt(cm[1],10); }
    var hi=Math.max(to,lastN+30);
    tlds.forEach(function(t){
      var u0='https://'+base+'.'+t; if(L.indexOf(u0)<0) L.push(u0);
      for(var n=hi;n>=lo;n--){ var u='https://'+base+n+'.'+t; if(L.indexOf(u)<0) L.push(u); }
    });
    return L;
  }
  fetch('../urls.json?_='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    var cfg=d[KEY]; if(!cfg){ msg('설정 없음'); return; }
    var manual=cfg.manual||[];
    if(manual.length){ done(manual[0]); return; }
    var L=build(d,cfg);
    pickInOrder(L,14).then(function(u){
      if(u){ done(u); return; }
      msg('접속 가능한 주소를 못 찾았어요.<br>'+L.slice(0,10).map(function(x){return '<a href="'+x+'">'+x.replace(/^https?:\/\//,'')+'</a>';}).join(''));
    });
  }).catch(function(){ msg('불러오기 실패'); });
})();
</script>
